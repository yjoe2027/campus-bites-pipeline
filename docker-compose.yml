services:
  postgres:
    image: postgres:16
    container_name: campus_bites_db
    environment:
      POSTGRES_USER: campus
      POSTGRES_PASSWORD: bites
      POSTGRES_DB: campus_bites
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
